name: Dental E2E

on:
  pull_request:
    paths:
      - "apps/web/playwright/dental/**"
      - "packages/lib/dental/**"
      - "packages/pvs-integration/**"
      - "packages/pvs-connector/**"
      - "apps/web/app/api/smart-fill/**"
      - "apps/web/app/api/pvs/**"
      - "playwright.config.ts"
      - ".github/workflows/dental-e2e.yml"
  workflow_dispatch:

env:
  NEXT_PUBLIC_IS_E2E: "1"
  PVS_SYNC_ENABLED: "1"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/calendso
  DATABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/calendso
  NEXTAUTH_SECRET: e2e-dental-nextauth-secret-min-32-chars
  CALENDSO_ENCRYPTION_KEY: e2e-dental-calendso-encryption-key-32
  NEXT_PUBLIC_WEBAPP_URL: http://localhost:3000
  NEXTAUTH_URL: http://localhost:3000/api/auth

jobs:
  dental-e2e:
    name: Dental Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calendso
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps

      - name: Prepare database
        run: |
          yarn prisma generate
          yarn db-deploy
          yarn db-seed

      - name: Build web app
        run: yarn workspace @calcom/web build

      - name: Run dental E2E tests
        run: yarn e2e:dental --workers=1
