name: Deploy PraxisTermin landing to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "apps/praxistermin-landing/**"
      - "apps/web/modules/marketing/dental/**"
      - ".github/workflows/deploy-praxistermin-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: praxistermin-landing-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Resolve GitHub Pages base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO_NAME}/" >> "$GITHUB_ENV"
          fi

      - name: Build static landing
        run: yarn workspace @calcom/praxistermin-landing build
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/praxistermin-landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
