name: Deploy PraxisTermin landing to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "apps/praxistermin-landing/**"
      - "apps/web/modules/marketing/dental/**"
      - ".github/workflows/deploy-praxistermin-landing.yml"
  pull_request:
    paths:
      - "apps/praxistermin-landing/**"
      - "apps/web/modules/marketing/dental/**"
      - ".github/workflows/deploy-praxistermin-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: praxistermin-landing-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Resolve GitHub Pages base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO_NAME}/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Build static landing
        run: yarn workspace @calcom/praxistermin-landing build
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          PAGES_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}

      - name: Verify build output
        run: |
          test -f apps/praxistermin-landing/dist/index.html
          test -f apps/praxistermin-landing/dist/404.html
          test -f apps/praxistermin-landing/dist/.nojekyll
          echo "Pages artifact OK ($(du -sh apps/praxistermin-landing/dist | cut -f1))"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/praxistermin-landing/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## PraxisTermin Landing live" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Set \`VITE_APP_URL\` in repo Variables for login CTAs." >> "$GITHUB_STEP_SUMMARY"
