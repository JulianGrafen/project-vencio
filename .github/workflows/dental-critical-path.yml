name: Dental critical path

on:
  pull_request:
    paths:
      - "packages/lib/dental/**"
      - "packages/lib/encryption/**"
      - "packages/pvs-integration/**"
      - "packages/trpc/server/procedures/dentalAuthedProcedure.ts"
      - "packages/trpc/server/routers/viewer/bookings/**"
      - "packages/trpc/server/routers/viewer/smartFill/**"
      - "apps/web/app/api/pvs/**"
      - "apps/web/app/api/webhooks/smart-fill/**"
  push:
    branches:
      - master
    paths:
      - "packages/lib/dental/**"
      - "packages/lib/encryption/**"
      - "packages/pvs-integration/**"

jobs:
  dental-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run dental + PVS unit tests
        run: yarn vitest run packages/lib/dental packages/pvs-integration --reporter=dot
